<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <table border="2px">
            <tr>
                <th style=" background-color: rgb(195, 173, 238);">Name</th>
                <th style="background-color: rgb(195, 173, 238);">Value</th>
            </tr>
            <tr>
                <td>Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Sex</td>
                <td><input type="radio" name="a"> <label>Male</label>
                <br>
                <input type="radio" name="a" checked> <label>Female</label>
            </td>
            </tr>
            <tr>
                <td>Eye color</td>
                <td><select>
                    <option selected>Green</option>
                    <option >Black</option>
                    <option >Brown</option>
                    <option >Baige</option>
                    <option >Blue</option>
                </select></td>
            </tr>
            <tr>
                <td>Check All that apply</td>
                <td>
                    <input type="checkbox"> <label for="">Over 6 feet tall</label>
                    <br>
                    <input type="checkbox"> <label for="">Over 200 pounds</label>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    Describe your athletic ability:
                    <br>
                    <input type="text" style="width: 97.5%; height: 100px">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <center><button>Enter Your Information</button></center>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
