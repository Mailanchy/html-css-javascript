<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    </style>
</head>
<body>
    <center>
        <!-- cell spacing = spacing between cells, cell padding =. spacing between the content and the border of cell,  -->
        <table border="2px" cellspacing = '50px' cellpadding = '50px' rules = 'all'>
        <tr> <!--tr = table raw-->
            <td>A</td> <!--td = table data-->
            <td>B</td>
            <td>C</td>
            <td>D</td>
        </tr>
        <tr>
            <td rowspan="4">I</td>
            <td>F</td>
            <td>G</td>
            <td>H</td>
        </tr>
        <tr>
            <td colspan="2">K</td>
            <td>O</td>
        </tr>
        <tr>
            <td>X</td>
            <td>M</td>
            <td rowspan="2">N</td>
        </tr>
        <tr>
            <td>S</td>
            <td>P</td>
        </tr>
    </table>
    </center>
</body>
</html>
