<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <!-- border collapse can be used to collapse all the borders just as rules = all -->
        <table border = '2px' style="border:2px solid red;">
            <tr>
                <td>
                    <table border = '6px' style="border:2px solid yellow;">
                        <tr>
                            <th colspan="2">Nested Table 1</th>
                        </tr>
                        <tr>
                            <th>Column 1</th>
                            <th>Column 2</th>
                        </tr>
                        <tr>
                            <td>Our first table</td>
                            <td>Nested within</td>
                        </tr>
                    </table>
                </td>

                <td>
                    <table border="2px" style="border:2px solid blue;">
                        <tr>
                            <th>Nested Table 2</th>
                        </tr>
                        <tr>
                            <td>
                                <ul>
                                    <li>List Object 1</li>
                                    <li>List object 2</li>
                                    <li>List object 3</li>
                                </ul>
                            </td>
                        </tr>
                    </table>
                    
                </td>
            </tr>
            <tr>
                <td>
                    <table border="2px" style=" border:2px solid black;">
                        <tr>
                            <th colspan="2">Nested Table 3</th>
                        </tr>
                        <tr>
                            <td>Nested table</td>
                            <td>Demo Continued</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <center>
                        <table border="2px" style="border:2px solid green;">
                        <tr>
                            <th>Nested Table 4</th>
                        </tr>
                        <tr>
                            <td><center><img src="assets/sample.jpeg" height="90px" width="120px"></center></td>
                        </tr>
                    </table>
                    </center>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
