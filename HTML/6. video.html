<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>MULTIMEDIA TAGS: VIDEO</h1>
    <h3>1. src</h3>
    <!-- when we give only src the video wont play but instead just an image -->
    <video src="assets/samplev.mp4" width="900px"></video>
    <h3>2. controls</h3>
    <!-- when we give controls it allows the user to control thevideo and only when it starts to play -->
    <video src="assets/samplev.mp4" width="900px" controls></video>
    <h3>3. autoplay</h3>
    <!-- to make the  video automaticlay play without user interaction -->
    <video src="assets/samplev.mp4" width="900px" controls autoplay></video>
    <h3>4. loop</h3>
    <!-- to make the video play in a continuos manner -->
    <video src="assets/samplev.mp4" width="900px" controls loop></video>
    <h3>5. muted</h3>
    <!-- to make the audio muted by defualt, still we can unmute it -->
    <video src="assets/samplev.mp4" width="900px" controls muted></video>
    <h3>6. poster</h3>
    <!-- to give thumbnail image -->
    <video src="assets/samplev.mp4" width="900px" controls poster="assets/sample.jpeg"></video>


</body>
</html>
