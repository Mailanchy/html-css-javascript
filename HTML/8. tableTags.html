<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <!-- table tag is used to create table -->
         <!-- the number of cells in each raw and each column should be same other wise the code itself put empty cells -->
        <table border="2px">
            <!-- thead: its just for preofessioanlity and  is especially useful for organizing and styling the table's headings separately from the body and footer of the table. -->
            <thead>
                <!-- tr stands for table raw and is used to define raw of table -->
                <tr>
                    <!-- th is used to store data in each cell in the raw with data that is bold than the cntetn in the td -->
                    <th>th data</th>
                    <!-- td stands for table data and is used to fill up each cell in the raw with data -->
                    <td>data1</td>
                    <td>data2</td>
                </tr>
            </thead>
            <!-- tbody: same as thead -->
            <tbody>
                <tr>
                    <td>data1</td>
                    <td>data2</td>
                    <td>data3</td>
                </tr>
                <tr>
                    <td>data1</td>
                    <td>data2</td>
                    <td>data3</td>
                </tr>
            </tbody>
            <!-- tfoot: same as thead and tbody -->
            <tfoot>
                <tr>
                    <td>data1</td>
                    <td>data2</td>
                    <td>data3</td>
                </tr>
            </tfoot>
        </table>
    </center>
</body>
</html>
