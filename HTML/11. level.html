<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- levels of html
    1. block level elements : occupy complete width of the page
                            : elements will be occur in newline
    2. inline level elements: occupy the content space only
                            : elements will be occur in side by side -->
    <h1>Level of Elements</h1>
    <h2>1. block level elements</h2>
    eg:
    <h5>h1, h2, h3, etc</h5>
    <p>paragraph</p>
    <h2>2. inline level elements</h2>
    <span>span</span>
    <mark>mark tag</mark>

</body>
</html>
