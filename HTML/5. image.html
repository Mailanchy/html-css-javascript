<!--one of the multimedia tags
only supported in html 5 and introduced in html5-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>MULTIMEDIA TAGS : IMAGE</h1>
    <!-- ATTRIBUTES -->
     1. src
     <br>
     <!-- 1. src /this attribute takes the source of image -->
     <img src="assets/sample.jpeg" sizes="Full">
     <br>
     2. alt
     <br>
     <!-- 2. alt = which is used to show a message if anything goes worng with the src -->
    <img src="assets/sampl.jpeg" alt = "Oopsiess, you can only see me when src fails">
    <br>
    3. height and width
    <br>
    <!-- 3. height and width /the stadnard is to use the measure in px unit -->
    <img src="assets/sample.jpeg" alt="" height="300px" width="300px">
    <br>
    4. style (eg: border)
    <br>
    <!-- 4. style /same as everywhere -->
     <img src="assets/sample.jpeg" alt="" height="300px" width="300px" style="border: 10px; border-style: solid; border-color: rgb(48, 48, 91);">

</body>
</html>
